<!DOCTYPE html>
<html>
<head>
  <title>LocalSaver</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      background:#0B0B0B;
      color:white;
      margin:0;
    }

    .hidden { display:none; }

    .container-box {
      padding:15px;
    }

    .logo {
      height:40px;
    }

    .card {
      background:#151515;
      padding:12px;
      margin:10px 0;
      border-radius:12px;
    }

    .category {
      display:inline-block;
      padding:8px 12px;
      background:#222;
      border-radius:20px;
      margin-right:8px;
      font-size:12px;
    }

    .bottom-nav {
      position:fixed;
      bottom:0;
      width:100%;
      background:#111;
      display:flex;
      justify-content:space-around;
      padding:10px 0;
      border-top:1px solid #222;
    }

    .nav-item {
      color:white;
      text-align:center;
      cursor:pointer;
    }

    .active {
      color:#6EDC5A;
    }

    .carousel {
      display:flex;
      overflow-x:auto;
      gap:10px;
    }

    .carousel-item {
      min-width:250px;
      background:#222;
      padding:15px;
      border-radius:12px;
    }

  </style>
</head>

<body>

<!-- HOME SCREEN -->
<div id="homeScreen" class="container-box">

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center">
    <img src="/static/logo.png" class="logo">
    <span onclick="goProfile()">👤</span>
  </div>

  <!-- NEW IN TOWN -->
  <h5 class="mt-3">🆕 New in Town</h5>
  <div class="carousel" id="carousel"></div>

  <!-- CATEGORIES -->
  <h5 class="mt-3">Categories</h5>
  <div>
    <span class="category">Food</span>
    <span class="category">Cafe</span>
    <span class="category">Salon</span>
    <span class="category">Fitness</span>
  </div>

  <!-- TRENDING -->
  <h5 class="mt-3">🔥 Trending Deals</h5>
  <div id="deals"></div>

</div>


<!-- PROFILE SCREEN -->
<div id="profileScreen" class="container-box hidden">

  <button onclick="goHome()" class="btn btn-sm btn-secondary mb-3">←</button>

  <h4>Profile</h4>

  <div class="card">
    <b id="userName"></b><br>
    <span id="userPhone"></span>
  </div>

  <div class="card">
    <h5>💰 Wallet</h5>
    <h3 id="points">0 pts</h3>
  </div>

  <div class="card">
    <h5>📷 Scan QR</h5>
    <button onclick="startScanner()" class="btn btn-warning w-100 mb-2">Scan</button>
    <div id="reader"></div>
  </div>

  <button onclick="logout()" class="btn btn-danger w-100 mt-3">Logout</button>

</div>


<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="goHome()">🏠<br>Home</div>
  <div class="nav-item" onclick="goProfile()">👤<br>Profile</div>
</div>


<script>

const API = "http://192.168.1.11:8000";

function goHome(){
  document.getElementById("homeScreen").style.display="block";
  document.getElementById("profileScreen").style.display="none";
}

function goProfile(){
  document.getElementById("homeScreen").style.display="none";
  document.getElementById("profileScreen").style.display="block";

  loadProfile();
  loadWallet();
}

function loadProfile(){
  const user = JSON.parse(localStorage.getItem("user"));
  document.getElementById("userName").innerText = user.name;
  document.getElementById("userPhone").innerText = user.phone;
}

function logout(){
  localStorage.clear();
  location.reload();
}

// DEALS
async function loadDeals(){

  const res = await fetch(API + "/deals");
  const data = await res.json();

  let html="";
  let carouselHtml="";

  data.forEach((d,i)=>{

    html += `
    <div class="card">
      <b>${d.title}</b><br>
      ${d.description || ""}
    </div>
    `;

    if(i < 5){
      carouselHtml += `
      <div class="carousel-item">
        <b>${d.title}</b><br>
        ${d.description || ""}
      </div>
      `;
    }

  });

  document.getElementById("deals").innerHTML = html;
  document.getElementById("carousel").innerHTML = carouselHtml;

}

// WALLET
async function loadWallet(){
  const res = await fetch(API + "/wallet",{
    headers:{
      "Authorization":"Bearer "+localStorage.getItem("token")
    }
  });

  const d = await res.json();
  document.getElementById("points").innerText = (d.points || 0) + " pts";
}

// SCANNER
function startScanner(){

  const qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode:"environment" },
    { fps:10 },
    async (decodedText)=>{

      await fetch(API + "/redemptions/redeem",{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "Authorization":"Bearer "+localStorage.getItem("token")
        },
        body:JSON.stringify({
          deal_id:decodedText
        })
      });

      alert("Redeemed");
      loadWallet();
      qr.stop();

    }
  );

}

// INIT
loadDeals();

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Login - Offro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
body {
    margin:0; height:100vh; display:flex;
    justify-content:center; align-items:center;
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a3a32, #3E5F55, #A9CDBA);
    overflow:hidden;
}
.bg-logo {
    position:absolute; width:420px; top:38%; left:50%;
    transform:translate(-50%,-50%); opacity:0.07; pointer-events:none;
}
.card {
    background:#FDFBF6; border-radius:20px;
    padding:44px 48px; width:420px;
    box-shadow:0 24px 60px rgba(0,0,0,0.3); z-index:2;
    text-align:center;
}
.logo-wrap { display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:8px; }
.logo-wrap svg { width:56px; height:56px; }
.logo-text { font-size:22px; font-weight:800; color:#3E5F55; }
.logo-sub { color:#6b8c7e; font-size:13px; margin-bottom:28px; }
.badge-admin {
    display:inline-block; background:#CDEBD6; color:#3E5F55;
    font-size:11px; font-weight:700; padding:4px 12px;
    border-radius:20px; margin-bottom:24px; letter-spacing:0.5px;
    text-transform:uppercase;
}
.form-label-custom { font-size:12px; font-weight:600; color:#6b8c7e; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:5px; text-align:left; display:block; }
.form-control {
    border:1px solid #d4e8de; background:#fff; border-radius:10px;
    padding:10px 14px; font-size:14px; color:#2c3e35; width:100%;
}
.form-control:focus { border-color:#3E5F55; box-shadow:0 0 0 3px rgba(62,95,85,0.12); outline:none; }
.btn-main {
    background:#3E5F55; border:none; color:white; border-radius:10px;
    padding:12px; font-size:15px; font-weight:600; width:100%;
    cursor:pointer; transition:0.2s; margin-top:6px;
}
.btn-main:hover { background:#2d4a42; }
#msg { color:#c0392b; font-size:13px; min-height:18px; margin-top:10px; }
</style>
</head>
<body>

<!-- Watermark -->
<svg class="bg-logo" viewBox="0 0 100 130" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M50 10C30.1 10 14 26.1 14 46c0 26.5 36 74 36 74s36-47.5 36-74C86 26.1 69.9 10 50 10z" fill="white"/>
  <circle cx="50" cy="44" r="18" fill="none" stroke="white" stroke-width="2"/>
  <text x="50" y="51" text-anchor="middle" font-size="20" font-weight="900" fill="white" font-family="Arial">%</text>
</svg>

<div class="card">
    <div class="logo-wrap">
        <svg viewBox="0 0 100 130" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="50" cy="45" rx="34" ry="34" fill="#3E5F55"/>
          <path d="M50 10C30.1 10 14 26.1 14 46c0 26.5 36 74 36 74s36-47.5 36-74C86 26.1 69.9 10 50 10z" fill="#3E5F55"/>
          <circle cx="50" cy="44" r="18" fill="white" opacity="0.25"/>
          <text x="50" y="51" text-anchor="middle" font-size="20" font-weight="900" fill="white" font-family="Arial">%</text>
        </svg>
        <div class="logo-text">Offr<span style="color:#A9CDBA;">O</span></div>
    </div>
    <div class="logo-sub">Administration Portal</div>
    <div class="badge-admin">🔒 Restricted Access</div>

    <div class="mb-3 text-start">
        <label class="form-label-custom">Username</label>
        <input id="username" class="form-control" placeholder="Enter admin username">
    </div>
    <div class="mb-3 text-start">
        <label class="form-label-custom">Password</label>
        <input id="password" type="password" class="form-control" placeholder="Enter password">
    </div>
    <button class="btn-main" onclick="login()">Login to Admin Panel</button>
    <p id="msg" class="mt-3 mb-0"></p>
</div>

<script>
async function login() {
    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value;
    if (!username || !password) {
        document.getElementById("msg").innerText = "Enter username and password";
        return;
    }
    try {
        let res = await fetch("/admin/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
            credentials: "include"
        });
        let data = await res.json();
        if (!res.ok) { document.getElementById("msg").innerText = data.detail; return; }
        window.location.href = "/admin/dashboard";
    } catch {
        document.getElementById("msg").innerText = "Server error. Try again.";
    }
}
document.addEventListener("keydown", e => { if (e.key === "Enter") login(); });
</script>

</body>
</html>
